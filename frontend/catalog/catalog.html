<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATALOGO | SANTIAGO GALLARDO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="catalog.css">
    <link rel="icon" href="../media/logo.png" type="image/png">
</head>
<body>
    <img src="../media/hero.jpg" alt="" class="bg-blur">
    <div class="hero-overlay"></div>

    <nav>
        <a href="../home/index.html" class="logo-wrapper" aria-label="Inicio">
            <img class="logo" src="../media/logo.png" alt="Logo">
        </a>
        <div class="nav-links">
            <a href="../catalog/catalog.html" class="nav-icon" aria-label="Catalogo">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </a>
            <a href="../chat/chat.html" class="nav-icon" aria-label="Chat">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path></svg>
            </a>
            <a href="../cart/cart.html" class="nav-icon" aria-label="Carrito">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            </a>
            <a href="../login/login.html" class="nav-icon" aria-label="Perfil">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </a>
        </div>
    </nav>

    <main class="page">
        <section class="hero">
            <div class="hero-card">
                <div>
                    <p class="eyebrow">Catalogo vivo</p>
                    <h1>Vinilos y colecciones listas para sonar.</h1>
                    <p class="hero-copy">Explora el catalogo completo, filtra por categoria y guarda tus favoritos en el carrito.</p>
                </div>
                <div class="controls">
                    <input id="searchInput" type="search" placeholder="Buscar por nombre, genero o descripcion">
                    <select id="categoryFilter">
                        <option value="">Todas las categorias</option>
                    </select>
                    <button class="btn btn-ghost" type="button" id="clearFilters">Limpiar</button>
                </div>
            </div>
        </section>

        <section class="catalog-grid" id="catalogGrid">
            <div class="state-card">Cargando catalogo...</div>
        </section>
    </main>

    <script src="../auth.js"></script>
    <script src="catalog.js"></script>
</body>
</html>
