<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARRITO | SANTIAGO GALLARDO</title>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cart.css">
    <link rel="icon" href="../media/logo.png" type="image/png">
</head>
<body>

    <img class="bg-blur" src="../media/hero.jpg" alt="">
    <div class="hero-overlay"></div>

    <nav>
        <a href="../home/index.html" class="logo-wrapper">
            <img class="logo" src="../media/logo.png" alt="Logo">
        </a>

    </nav>

    <main class="cart-container">
        <header class="cart-header">
            <h1>Tu Carrito</h1>
            <div class="title-underline"></div>
        </header>

        <div class="cart-layout">
            <section class="cart-items" id="cartItems">

            </section>

            <aside class="cart-summary">
                <div class="summary-card">
                    <div class="glass-shimmer"></div>
                    <h2>Resumen</h2>
                    <div class="summary-line">
                        <span>Subtotal</span>
                        <span id="subtotalVal">$0</span>
                    </div>
                    <div class="summary-line">
                        <span>Envío</span>
                        <span class="free-shipping">Gratis</span>
                    </div>
                    <hr class="summary-divider">
                    <div class="summary-line total">
                        <span>Total</span>
                        <span id="totalVal">$0</span>
                    </div>
                    <button class="btn-checkout" type="button" id="checkoutBtn" disabled>Finalizar Compra</button>
                    <a href="../home/index.html" class="continue-link">Continuar Comprando</a>
                </div>
            </aside>
        </div>
    </main>

    <script src="../auth.js"></script>
    <script>
    (function () {
        const CART_KEY = 'sg_cart_items';

        function getCart() {
            try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }
            catch { return []; }
        }

        function saveCart(items) {
            localStorage.setItem(CART_KEY, JSON.stringify(items));
            const total = items.reduce((s, i) => s + i.price * i.qty, 0);
            localStorage.setItem('sg_cart_summary', JSON.stringify({ items, total }));
        }

        function fmt(n) {
            return '$' + n.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function render() {
            const cart = getCart();
            const cartItems = document.getElementById('cartItems');
            const subtotalVal = document.getElementById('subtotalVal');
            const totalVal = document.getElementById('totalVal');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (!cart.length) {
                cartItems.innerHTML = `
                    <div class="cart-empty">
                        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3;margin-bottom:16px"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                        <p>Tu carrito está vacío</p>
                        <a href="../home/index.html" class="btn-checkout" style="text-decoration:none;display:inline-block;text-align:center;margin-top:16px">Explorar productos</a>
                    </div>
                `;
                subtotalVal.textContent = '$0';
                totalVal.textContent = '$0';
                checkoutBtn.disabled = true;
                return;
            }

            checkoutBtn.disabled = false;

            cartItems.innerHTML = cart.map((item, idx) => {
                const imgHTML = item.img
                    ? `<div class="item-img"><img src="${item.img}" alt="${item.name}"></div>`
                    : '';
                return `
                    <article class="cart-item-card" data-idx="${idx}">
                        <div class="glass-shimmer"></div>
                        ${imgHTML}
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <p>${fmt(item.price)} c/u</p>
                        </div>
                        <div class="item-quantity">
                            <button class="qty-dec">−</button>
                            <span>${item.qty}</span>
                            <button class="qty-inc">+</button>
                        </div>
                        <div class="item-price">
                            <span>${fmt(item.price * item.qty)}</span>
                        </div>
                        <button class="remove-btn" aria-label="Eliminar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </article>
                `;
            }).join('');

            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            subtotalVal.textContent = fmt(subtotal);
            totalVal.textContent = fmt(subtotal);
        }

        document.getElementById('cartItems').addEventListener('click', (e) => {
            const card = e.target.closest('[data-idx]');
            if (!card) return;
            const idx = Number(card.dataset.idx);
            const cart = getCart();

            if (e.target.closest('.qty-dec')) {
                if (cart[idx].qty > 1) { cart[idx].qty--; }
                else { cart.splice(idx, 1); }
                saveCart(cart);
                render();
            } else if (e.target.closest('.qty-inc')) {
                cart[idx].qty++;
                saveCart(cart);
                render();
            } else if (e.target.closest('.remove-btn')) {
                cart.splice(idx, 1);
                saveCart(cart);
                render();
            }
        });

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            const cart = getCart();
            if (!cart.length) return;
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            localStorage.setItem('sg_cart_summary', JSON.stringify({ items: cart, total }));
            window.location.href = '../checkout/checkout.html';
        });

        render();
    })();
    </script>

</body>
</html>
