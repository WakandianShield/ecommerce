<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESO | SANTIAGO GALLARDO</title>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="../media/logo.png" type="image/png">
</head>
<body>

    <nav>
        <a href="../home/index.html" class="logo-wrapper">
            <img class="logo" src="../media/logo.png" alt="Logo">
        </a>
    </nav>

    <div class="login-wrapper">
        <img src="../media/hero.jpg" alt="Background" class="bg-blur">
        <div class="hero-overlay"></div>

        <main class="login-card">
            <div class="glass-shimmer"></div>
            <div class="form-tabs">
                <button type="button" class="tab-active" id="btn-login">LOGIN</button>
                <button type="button" id="btn-signup">REGISTRO</button>
            </div>

            <div class="login-header">
                <h1 id="main-title">Bienvenido</h1>
                <p id="main-desc">Ingresa a tu zona de confort</p>
            </div>

            <form id="auth-form">
                <div class="input-group" id="name-group" style="display:none">
                    <label for="full-name">Nombre completo</label>
                    <input type="text" id="full-name" placeholder="Tu nombre">
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tu@ejemplo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div id="auth-error" style="display:none;color:#ff6b6b;font-size:.82rem;text-align:center;margin-bottom:10px;padding:10px 14px;background:rgba(255,70,70,.1);border-radius:12px;border:1px solid rgba(255,70,70,.2)"></div>

                <button type="submit" class="btn-primary" id="submit-btn">Iniciar Sesión</button>
            </form>
        </main>
    </div>

    <script src="../auth.js"></script>
    <script src="login.js"></script>
</body>
</html>
