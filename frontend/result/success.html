<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTADO DE LA TRANSACCIÓN | SANTIAGO GALLARDO</title>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="success.css">
    <link rel="icon" href="../media/logo.png" type="image/png">
</head>
<body>

    <img class="bg-blur" src="../media/hero.jpg" alt="">
    <div class="hero-overlay"></div>

    <main class="status-container">
        <div class="status-card" id="status-card">
            <div class="glass-shimmer"></div>
            
            <div class="status-icon-wrapper" id="icon-wrapper">

            </div>

            <div class="text-content">
                <h1 id="status-title">Procesando...</h1>
                <p id="status-message">Estamos verificando tu transacción con el banco.</p>
            </div>

            <div class="info-glass-panel" id="info-panel">
                <div class="info-row">
                    <span>Referencia:</span>
                    <span class="info-value" id="ref-id">#SG-77290</span>
                </div>
                <div class="info-row">
                    <span>Fecha:</span>
                    <span class="info-value" id="current-date">12 May 2026</span>
                </div>
            </div>

            <div class="button-group">
                <a href="../home/index.html" class="btn-main" id="btn-primary">Ir al Inicio</a>
            </div>
        </div>
    </main>

    <script src="success.js"></script>
</body>
</html>
