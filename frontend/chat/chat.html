<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAT | SANTIAGO GALLARDO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="chat.css">
    <link rel="icon" href="../media/logo.png" type="image/png">
</head>
<body>
    <div class="ambient"></div>

    <nav class="topbar">
        <a class="brand" href="../home/index.html">
            <img class="brand-logo" src="../media/logo.png" alt="Logo">
            <div>
                <p class="brand-title">Santiago Gallardo</p>
                <p class="brand-sub">Chat en tiempo real</p>
            </div>
        </a>
        <div class="nav">
            <a href="../home/index.html">Inicio</a>
            <a href="../catalog/catalog.html">Catalogo</a>
            <a href="../orders/orders.html">Mis compras</a>
            <a href="../cart/cart.html">Carrito</a>
            <a class="active" href="chat.html">Chat</a>
            <a href="../login/login.html">Perfil</a>
        </div>
    </nav>

    <main class="page">
        <section class="chat-card">
            <header class="chat-header">
                <div>
                    <p class="eyebrow">Asistente</p>
                    <h1>Resuelve tus dudas en minutos</h1>
                </div>
                <span id="chatStatus" class="status">Conectando...</span>
            </header>

            <div id="chatMessages" class="chat-messages"></div>

            <form id="chatForm" class="chat-form">
                <input id="chatInput" type="text" placeholder="Escribe tu mensaje..." autocomplete="off" required>
                <button type="submit" class="btn-send">Enviar</button>
            </form>
        </section>
    </main>

    <script src="../auth.js"></script>
    <script src="chat.js"></script>
</body>
</html>
